name: test

on:
  pull_request:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build workspace library packages
        run: pnpm --filter @profullstack/sh1pt-core --filter @profullstack/sh1pt-actions-fleet-core --filter @profullstack/sh1pt-policy --filter @profullstack/sh1pt-agent-provider-shared build

      - run: pnpm test
        env:
          CI: true
