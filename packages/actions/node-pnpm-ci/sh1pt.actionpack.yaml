schemaVersion: 1
id: node-pnpm-ci
name: Node pnpm CI
description: Least-privilege Node/TypeScript CI workflow using pnpm — install, typecheck, test.
version: 1.0.0
publisher: profullstack
visibility: public
license: MIT
categories:
  - ci
  - node
  - typescript
compatibility:
  providers:
    - github
  languages:
    - javascript
    - typescript
  packageManagers:
    - pnpm
  frameworks:
    - next
    - sveltekit
    - react
pricing:
  type: free
inputs:
  nodeVersion:
    type: string
    default: '22'
    description: Node.js version to install.
  pnpmVersion:
    type: string
    default: '9'
    description: pnpm major version to install.
  installCommand:
    type: string
    default: pnpm install --frozen-lockfile
    description: Command to install dependencies.
  typecheckCommand:
    type: string
    default: pnpm typecheck
    description: Command to run typecheck.
  testCommand:
    type: string
    default: pnpm test
    description: Command to run tests.
secrets: []
repoVariables: []
files:
  - source: workflow.yml
    destination: .github/workflows/ci.yml
    mergeStrategy: replace-managed
policies:
  installMode: pull-request
  managedComment: true
  requiresReview: true
security:
  leastPrivilegePermissions: true
  pinThirdPartyActions: optional
  allowPullRequestTarget: false
  defaultTimeoutMinutes: 15
